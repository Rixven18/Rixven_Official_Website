# =============================================================================
# RIXVEN — wrangler.toml
# Cloudflare Pages configuration for production deployment
# =============================================================================

name = "rixven-web"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

# ---------------------------------------------------------------------------
# CLOUDFLARE PAGES
# ---------------------------------------------------------------------------
pages_build_output_dir = ".vercel/output/static"

# ---------------------------------------------------------------------------
# D1 DATABASE
# ---------------------------------------------------------------------------
[[d1_databases]]
binding = "DB"
database_name = "rixven-db"
database_id = "da5675dc-77fc-4bbe-a635-769709bf8a88"

# ---------------------------------------------------------------------------
# ENVIRONMENT VARIABLES
# ---------------------------------------------------------------------------
[vars]
ENVIRONMENT = "production"
NEXT_PUBLIC_SITE_URL = "https://www.rixven.com"
NEXT_PUBLIC_SITE_NAME = "RIXVEN"

# ---------------------------------------------------------------------------
# LIMITS
# ---------------------------------------------------------------------------
[limits]
cpu_ms = 60
max_duration = 30
memory_mb = 128